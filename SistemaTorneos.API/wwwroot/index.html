<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGT - Sistema de Gestión de Torneos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --neon: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        h1, h4 {
            font-family: 'Orbitron';
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glass {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-neon {
            background: var(--neon);
            color: white;
            border: none;
            font-weight: 700;
            transition: 0.3s;
        }

            .btn-neon:hover {
                box-shadow: 0 0 20px var(--neon);
                color: white;
            }

        .btn-outline-neon {
            border: 2px solid var(--green);
            color: var(--green);
            font-weight: 700;
        }

            .btn-outline-neon:hover {
                background: var(--green);
                color: var(--bg);
            }

        .match-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid var(--neon);
        }

        .winner {
            border-left: 5px solid var(--green);
            background: rgba(16, 185, 129, 0.1);
        }

        .crown {
            color: #fbbf24;
            margin-left: 10px;
        }

        .player-row {
            background: rgba(255,255,255,0.02);
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body onload="cargarTodo()">

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4" style="color: var(--neon)">Sistema de Torneos JH</h1>
            <p class="opacity-50">Gestión de Brackets en Tiempo Real</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass mb-4">
                    <h4>Inscripción</h4>
                    <input type="text" id="nombre" class="form-control bg-dark text-white border-0 mb-2" placeholder="Nombre Real">
                    <input type="text" id="alias" class="form-control bg-dark text-white border-0 mb-3" placeholder="Alias (GamerTag)">
                    <button class="btn btn-neon w-100" onclick="registrar()">REGISTRAR JUGADOR</button>
                </div>

                <div class="glass">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="mb-0" style="color: #60a5fa;">Lista en DB</h6>
                        <button class="btn btn-sm btn-danger" onclick="vaciarJugadores()">VACIAR TODO</button>
                    </div>
                    <div id="listaDB" class="small opacity-75">
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4>Cuadros de Batalla</h4>
                        <div>
                            <button class="btn btn-sm btn-danger me-2" onclick="limpiar()">REINICIAR TORNEO</button>
                            <button class="btn btn-sm btn-neon" onclick="generar()">NUEVO TORNEO</button>
                            <button class="btn btn-sm btn-outline-neon ms-2" onclick="avanzar()">AVANZAR RONDA</button>
                        </div>
                    </div>
                    <div id="bracketView">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TORNEOS = "/api/Torneos";
        const API_JUGADORES = "/api/Jugadores";

        async function cargarTodo() {
            cargarListaDB();
            const res = await fetch(`${API_TORNEOS}/encuentros`);
            const data = await res.json();
            renderBrackets(data);
        }

        // --- FUNCIONES DE JUGADORES ---
        async function cargarListaDB() {
            const res = await fetch(API_JUGADORES);
            const data = await res.json();
            const lista = document.getElementById('listaDB');

            if (data.length === 0) {
                lista.innerHTML = "<div class='text-center opacity-50 mt-2'>No hay jugadores registrados.</div>";
                return;
            }

            lista.innerHTML = data.map(j => `
                <div class="player-row d-flex justify-content-between align-items-center">
                    <span>🎮 ${j.alias} <small class="text-muted">(${j.nombre})</small></span>
                    <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="eliminarJugador(${j.id})">X</button>
                </div>
            `).join('');
        }

        async function registrar() {
            const nombre = document.getElementById('nombre').value;
            const alias = document.getElementById('alias').value;
            if (!nombre || !alias) return;

            await fetch(API_JUGADORES, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, alias })
            });

            document.getElementById('nombre').value = "";
            document.getElementById('alias').value = "";
            cargarListaDB();
        }

        async function eliminarJugador(id) {
            await fetch(`${API_JUGADORES}/${id}`, { method: 'DELETE' });
            cargarListaDB(); // Refresca la lista visual
        }

        async function vaciarJugadores() {
            if (confirm("¿Estás seguro de borrar TODOS los jugadores de la base de datos?")) {
                await fetch(`${API_JUGADORES}/limpiar`, { method: 'DELETE' });
                cargarListaDB();
            }
        }

        // --- FUNCIONES DE TORNEO ---
        async function generar() { await fetch(`${API_TORNEOS}/crear-ronda-inicial`, { method: 'POST' }); cargarTodo(); }
        async function avanzar() { await fetch(`${API_TORNEOS}/avanzar-ronda`, { method: 'POST' }); cargarTodo(); }
        async function limpiar() { await fetch(`${API_TORNEOS}/limpiar-torneo`, { method: 'DELETE' }); cargarTodo(); }

        async function setGanador(id, nombre) {
            await fetch(`${API_TORNEOS}/registrar-ganador/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nombre)
            });
            cargarTodo();
        }

        function renderBrackets(encuentros) {
            const view = document.getElementById('bracketView');
            if (encuentros.length === 0) { view.innerHTML = "<p class='opacity-50 text-center mt-5'>No hay un torneo activo.</p>"; return; }

            const rondas = {};
            encuentros.forEach(e => {
                if (!rondas[e.ronda]) rondas[e.ronda] = [];
                rondas[e.ronda].push(e);
            });

            view.innerHTML = Object.keys(rondas).map(r => `
                <div class="mb-4">
                    <h6 class="text-muted mb-3">RONDA ${r}</h6>
                    ${rondas[r].map(e => `
                        <div class="match-card ${e.ganador ? 'winner' : ''} d-flex flex-wrap justify-content-between align-items-center">
                            <div class="${e.ganador === e.jugadorA ? 'fw-bold text-info' : ''}">
                                ${e.jugadorA} ${e.ganador === e.jugadorA ? '<span class="crown">👑</span>' : ''}
                                ${!e.ganador ? `<button class="btn btn-sm btn-dark ms-2" onclick="setGanador(${e.id},'${e.jugadorA}')">🏆</button>` : ''}
                            </div>
                            <div class="text-danger fw-bold mx-2">VS</div>
                            <div class="${e.ganador === e.jugadorB ? 'fw-bold text-info' : ''}">
                                ${!e.ganador && e.jugadorB !== 'BYE' ? `<button class="btn btn-sm btn-dark me-2" onclick="setGanador(${e.id},'${e.jugadorB}')">🏆</button>` : ''}
                                ${e.ganador === e.jugadorB ? '<span class="crown">👑</span>' : ''} ${e.jugadorB}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
